<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Articles Flashcards</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #1a1a2e);
    color: var(--tg-theme-text-color, #eee);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  .screen {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 1.15rem;
    font-weight: 600;
    opacity: 0.8;
  }

  .streak-badge {
    font-size: 0.88rem;
    font-weight: 700;
    background: rgba(251,146,60,0.15);
    color: #fb923c;
    border: 1px solid rgba(251,146,60,0.35);
    padding: 4px 11px;
    border-radius: 20px;
  }

  /* ── Pill selectors ── */
  .section-label {
    align-self: flex-start;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.4;
    margin-bottom: 8px;
    margin-top: 18px;
  }

  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    width: 100%;
  }

  .pill {
    padding: 7px 13px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: var(--tg-theme-text-color, #eee);
    font-size: 0.83rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pill.active {
    background: #5b9cf6;
    border-color: #5b9cf6;
    color: #fff;
  }

  .pill:active { transform: scale(0.95); }

  .pill .ct {
    display: inline-block;
    background: rgba(255,255,255,0.28);
    border-radius: 10px;
    padding: 0 5px;
    font-size: 0.72rem;
    margin-left: 3px;
    line-height: 1.5;
  }

  /* ── Start button ── */
  .btn-start {
    margin-top: 28px;
    width: 100%;
    padding: 16px;
    background: #5b9cf6;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-start:active { opacity: 0.82; }

  .info-msg {
    margin-top: 12px;
    font-size: 0.85rem;
    opacity: 0.6;
    text-align: center;
    min-height: 20px;
  }

  /* ── Progress ── */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #5b9cf6;
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Score row ── */
  .score-row {
    display: flex;
    gap: 20px;
    margin-bottom: 18px;
    font-size: 0.9rem;
    width: 100%;
    justify-content: center;
  }
  .score-item { opacity: 0.6; }
  .score-item span { font-weight: 700; opacity: 1; }
  .score-correct span { color: #4ade80; }
  .score-wrong span   { color: #f87171; }

  /* ── Card ── */
  .card-scene {
    width: 100%;
    height: 195px;
    perspective: 800px;
    margin-bottom: 22px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.48s ease;
    border-radius: 20px;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 20px;
    gap: 4px;
  }

  .card-front {
    background: linear-gradient(135deg, #1e3a5f, #16213e);
    border: 1px solid rgba(91,156,246,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .card-back {
    background: linear-gradient(135deg, #1a3a2a, #0f2518);
    border: 1px solid rgba(74,222,128,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: rotateY(180deg);
  }

  .repeat-badge {
    position: absolute;
    top: 9px;
    right: 11px;
    font-size: 0.72rem;
    background: rgba(251,191,36,0.18);
    color: #fbbf24;
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    padding: 2px 8px;
  }

  .diff-badge {
    position: absolute;
    top: 9px;
    left: 11px;
    font-size: 0.68rem;
    opacity: 0.4;
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 2px 7px;
  }

  .card-word {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .card-translation {
    font-size: 0.9rem;
    opacity: 0.5;
    font-style: italic;
  }

  .swipe-hint {
    font-size: 0.7rem;
    opacity: 0.22;
    margin-top: 6px;
    letter-spacing: 0.3px;
  }

  .card-hint {
    font-size: 0.68rem;
    opacity: 0.28;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .card-article-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.4;
  }

  .card-article {
    font-size: 1.25rem;
    opacity: 0.45;
    font-weight: 300;
  }

  .card-full {
    font-size: 1.9rem;
    font-weight: 700;
  }

  .article-badge {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
  }

  .der { background: rgba(59,130,246,0.25);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.4); }
  .die { background: rgba(236,72,153,0.25);  color: #f9a8d4; border: 1px solid rgba(236,72,153,0.4); }
  .das { background: rgba(16,185,129,0.25);  color: #6ee7b7; border: 1px solid rgba(16,185,129,0.4); }

  /* ── Answer buttons ── */
  .answers {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 10px;
  }

  .btn-article {
    padding: 15px 8px;
    border: none;
    border-radius: 14px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn-article:active { transform: scale(0.95); }
  .btn-der { background: rgba(59,130,246,0.18); color: #93c5fd; border: 1.5px solid rgba(59,130,246,0.35); }
  .btn-die { background: rgba(236,72,153,0.18); color: #f9a8d4; border: 1.5px solid rgba(236,72,153,0.35); }
  .btn-das { background: rgba(16,185,129,0.18); color: #6ee7b7; border: 1.5px solid rgba(16,185,129,0.35); }
  .btn-article.correct { background: rgba(74,222,128,0.3) !important; border-color: #4ade80 !important; color: #4ade80 !important; }
  .btn-article.wrong   { background: rgba(248,113,113,0.3) !important; border-color: #f87171 !important; color: #f87171 !important; opacity: 0.7; }
  .btn-article:disabled { cursor: default; }

  /* ── Keyboard hint ── */
  .keyboard-hint {
    font-size: 0.72rem;
    opacity: 0.22;
    text-align: center;
    margin-top: 2px;
  }
  @media (pointer: coarse) { .keyboard-hint { display: none; } }

  /* ── Done screen ── */
  .done-emoji  { font-size: 3rem; margin-bottom: 6px; }
  .done-title  { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .done-score  { font-size: 2.4rem; font-weight: 800; color: #5b9cf6; margin-bottom: 4px; }
  .done-sub    { font-size: 0.88rem; opacity: 0.6; margin-bottom: 22px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 20px;
  }

  .stat-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 6px;
    text-align: center;
  }

  .stat-value {
    font-size: 1.35rem;
    font-weight: 800;
    color: #5b9cf6;
    display: block;
  }

  .stat-label {
    font-size: 0.68rem;
    opacity: 0.45;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-top: 3px;
  }

  .done-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }

  .btn-restart {
    padding: 14px;
    background: #5b9cf6;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-restart:active { opacity: 0.8; }

  .btn-menu {
    padding: 14px;
    background: rgba(255,255,255,0.07);
    color: var(--tg-theme-text-color, #eee);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-menu:active { opacity: 0.8; }
</style>
</head>
<body>

<!-- ── START SCREEN ── -->
<div class="screen" id="startScreen">
  <div class="header-row">
    <h1>🇩🇪 German Articles</h1>
    <div class="streak-badge" id="streakBadgeStart" style="display:none"></div>
  </div>

  <div class="section-label">Mode</div>
  <div class="pill-row">
    <button class="pill active" data-group="mode" data-val="all"  onclick="selectPill(this)">Practice All</button>
    <button class="pill"        data-group="mode" data-val="weak" onclick="selectPill(this)" id="weakPill">Weak Words 💪</button>
  </div>

  <div class="section-label">Category</div>
  <div class="pill-row">
    <button class="pill active" data-group="cat" data-val="all"      onclick="selectPill(this)">All</button>
    <button class="pill"        data-group="cat" data-val="animals"  onclick="selectPill(this)">Animals 🐾</button>
    <button class="pill"        data-group="cat" data-val="food"     onclick="selectPill(this)">Food 🍎</button>
    <button class="pill"        data-group="cat" data-val="colors"   onclick="selectPill(this)">Colors 🎨</button>
    <button class="pill"        data-group="cat" data-val="numbers"  onclick="selectPill(this)">Numbers 🔢</button>
    <button class="pill"        data-group="cat" data-val="everyday" onclick="selectPill(this)">Everyday 🏠</button>
  </div>

  <div class="section-label">Difficulty</div>
  <div class="pill-row">
    <button class="pill active" data-group="diff" data-val="all" onclick="selectPill(this)">All</button>
    <button class="pill"        data-group="diff" data-val="A1"  onclick="selectPill(this)">A1</button>
    <button class="pill"        data-group="diff" data-val="A2"  onclick="selectPill(this)">A2</button>
    <button class="pill"        data-group="diff" data-val="B1"  onclick="selectPill(this)">B1</button>
  </div>

  <button class="btn-start" onclick="startGame()">Start →</button>
  <div class="info-msg" id="startMsg"></div>
</div>

<!-- ── GAME SCREEN ── -->
<div class="screen" id="gameScreen" style="display:none">
  <div class="header-row">
    <h1>🇩🇪 German Articles</h1>
    <div class="streak-badge" id="streakBadgeGame" style="display:none"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="score-row">
    <div class="score-item score-correct">✅ <span id="scoreCorrect">0</span></div>
    <div class="score-item score-wrong">❌ <span id="scoreWrong">0</span></div>
    <div class="score-item">Card <span id="cardNum">1</span>/<span id="cardTotal">?</span></div>
  </div>

  <div class="card-scene" id="cardScene">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="repeat-badge" id="repeatBadge" style="display:none">🔁 repeat</div>
        <div class="diff-badge"   id="diffBadge"></div>
        <div class="card-word"    id="frontWord"></div>
        <div class="card-translation" id="frontTranslation"></div>
        <div class="swipe-hint">← der &nbsp;·&nbsp; die → &nbsp;·&nbsp; ↑ das</div>
        <div class="card-hint">tap to reveal · swipe to answer</div>
      </div>
      <div class="card-face card-back">
        <div class="card-article-label">the article is</div>
        <div class="card-article" id="backArticle"></div>
        <div class="card-full"    id="backFull"></div>
        <div id="backBadge"></div>
      </div>
    </div>
  </div>

  <div class="answers" id="answers">
    <button class="btn-article btn-der" onclick="answer('der')">der</button>
    <button class="btn-article btn-die" onclick="answer('die')">die</button>
    <button class="btn-article btn-das" onclick="answer('das')">das</button>
  </div>
  <div class="keyboard-hint">(1) der &nbsp; (2) die &nbsp; (3) das &nbsp;·&nbsp; Space: flip</div>
</div>

<!-- ── DONE SCREEN ── -->
<div class="screen" id="doneScreen" style="display:none">
  <div class="done-emoji" id="doneEmoji"></div>
  <div class="done-title">Round complete!</div>
  <div class="done-score" id="doneScore"></div>
  <div class="done-sub"   id="doneSub"></div>

  <div class="stats-grid" id="statsGrid" style="display:none">
    <div class="stat-box">
      <span class="stat-value" id="statSessions">—</span>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat-box">
      <span class="stat-value" id="statAccuracy">—</span>
      <div class="stat-label">Accuracy</div>
    </div>
    <div class="stat-box">
      <span class="stat-value" id="statWeak">—</span>
      <div class="stat-label">Weak words</div>
    </div>
  </div>

  <div class="done-buttons">
    <button class="btn-menu"    onclick="goMenu()">← Menu</button>
    <button class="btn-restart" onclick="restartSame()">Play again 🔁</button>
  </div>
</div>

<script>
const API_BASE   = 'https://46.225.99.97.nip.io/api';
const TG_USER_ID = window.Telegram?.WebApp?.initDataUnsafe?.user?.id?.toString() || 'anonymous';

// ── Card data ──────────────────────────────────────────────────────────────
const CARDS = [
  // Animals
  { word:'Hund',          article:'der', en:'dog',          cat:'animals',  diff:'A1' },

  { word:'Tür',           article:'die', en:'door',         cat:'everyday', diff:'A1' },

// ── State ──────────────────────────────────────────────────────────────────
let selectedMode = 'all';
let selectedCat  = 'all';
let selectedDiff = 'all';
let weakWordsFromAPI = [];

let deck = [], idx = 0, correct = 0, wrong = 0, answered = false;
let retryQueue = [], inRetryRound = false;
let sessionStart = 0, currentSessionId = '';
let lastRestartOptions = null;

// ── Streak ─────────────────────────────────────────────────────────────────
function getStreak() {
  return parseInt(localStorage.getItem('gfc_streak') || '0');
}

function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const last  = localStorage.getItem('gfc_last_date') || '';
  if (last === today) return getStreak();
  const yest = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const s = (last === yest) ? getStreak() + 1 : 1;
  localStorage.setItem('gfc_streak', s);
  localStorage.setItem('gfc_last_date', today);
  return s;
}

function renderStreak(id) {
  const s = getStreak();
  const el = document.getElementById(id);
  if (!el) return;
  if (s > 0) { el.textContent = `🔥 ${s}`; el.style.display = ''; }
  else el.style.display = 'none';
}

// ── Audio ──────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_) {}
  }
  return audioCtx;
}
function playTone(freq, ms, type = 'sine', vol = 0.25) {
  const ctx = getAudio(); if (!ctx) return;
  try {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + ms / 1000);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + ms / 1000 + 0.05);
  } catch(_) {}
}
const playCorrect = () => playTone(880, 80);
const playWrong   = () => playTone(140, 130, 'sawtooth', 0.18);

// ── API helpers ────────────────────────────────────────────────────────────
async function apiPost(path, data) {
  try {
    await fetch(API_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch(_) {}
}
async function apiGet(path) {
  try { return await (await fetch(API_BASE + path)).json(); }
  catch(_) { return null; }
}

// ── Pill selector ──────────────────────────────────────────────────────────
function selectPill(btn) {
  const g = btn.dataset.group;
  document.querySelectorAll(`.pill[data-group="${g}"]`).forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  if (g === 'mode') selectedMode = btn.dataset.val;
  if (g === 'cat')  selectedCat  = btn.dataset.val;
  if (g === 'diff') selectedDiff = btn.dataset.val;
}

// ── Setup start screen ─────────────────────────────────────────────────────
async function setupStart() {
  renderStreak('streakBadgeStart');
  if (TG_USER_ID !== 'anonymous') {
    const data = await apiGet(`/weak-words/${TG_USER_ID}`);
    if (Array.isArray(data) && data.length > 0) {
      weakWordsFromAPI = data;
      document.getElementById('weakPill').innerHTML =
        `Weak Words 💪 <span class="ct">${data.length}</span>`;
    }
  }
}

// ── Shuffle ────────────────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// ── Start game ─────────────────────────────────────────────────────────────
async function startGame() {
  let cards = CARDS;

  if (selectedCat  !== 'all') cards = cards.filter(c => c.cat  === selectedCat);
  if (selectedDiff !== 'all') cards = cards.filter(c => c.diff === selectedDiff);

  if (selectedMode === 'weak') {
    if (weakWordsFromAPI.length === 0) {
      showMsg('No weak words yet — practice more first!'); return;
    }
    const ws = new Set(weakWordsFromAPI.map(w => w.toLowerCase()));
    const filtered = cards.filter(c => ws.has(c.word.toLowerCase()));
    if (filtered.length === 0) {
      showMsg('No weak words in this category/difficulty.'); return;
    }
    cards = filtered;
  }

  if (cards.length === 0) {
    showMsg('No cards match — try a different combination.'); return;
  }

  lastRestartOptions = { cards: [...cards] };
  initGame(cards);
}

function showMsg(txt) {
  const el = document.getElementById('startMsg');
  el.textContent = txt;
  setTimeout(() => { el.textContent = ''; }, 3500);
}

function initGame(cards) {
  deck = shuffle(cards);
  idx = 0; correct = 0; wrong = 0; answered = false;
  retryQueue = []; inRetryRound = false;
  sessionStart = Date.now();
  currentSessionId = Math.random().toString(36).slice(2) + Date.now();

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('doneScreen').style.display  = 'none';
  document.getElementById('gameScreen').style.display  = '';
  document.getElementById('scoreCorrect').textContent  = '0';
  document.getElementById('scoreWrong').textContent    = '0';
  document.getElementById('progressFill').style.width  = '0%';
  document.getElementById('cardTotal').textContent     = deck.length;
  renderStreak('streakBadgeGame');
  loadCard();
}

// ── Load card ──────────────────────────────────────────────────────────────
function loadCard() {
  answered = false;
  const c = deck[idx];
  document.getElementById('cardNum').textContent       = idx + 1;
  document.getElementById('cardTotal').textContent     = deck.length;
  document.getElementById('frontWord').textContent     = c.word;
  document.getElementById('frontTranslation').textContent = c.en;
  document.getElementById('backArticle').textContent   = c.article;
  document.getElementById('backFull').textContent      = c.article + ' ' + c.word;
  document.getElementById('backBadge').innerHTML       =
    `<span class="article-badge ${c.article}">${c.article} · ${c.en}</span>`;
  document.getElementById('diffBadge').textContent     = c.diff || '';
  document.getElementById('repeatBadge').style.display = c._retry ? '' : 'none';

  document.getElementById('card').classList.remove('flipped');
  document.querySelectorAll('.btn-article').forEach(b => {
    b.className = 'btn-article btn-' + b.textContent.trim();
    b.disabled = false;
  });
  document.getElementById('progressFill').style.width =
    (idx / deck.length * 100) + '%';
}

// ── Flip card ──────────────────────────────────────────────────────────────
function flipCard() {
  if (!answered) document.getElementById('card').classList.toggle('flipped');
}

// ── Answer ─────────────────────────────────────────────────────────────────
function answer(chosen) {
  if (answered) return;
  answered = true;
  const c = deck[idx];
  const ok = chosen === c.article;

  if (ok) { correct++; playCorrect(); }
  else    { wrong++;   playWrong();
    if (!c._retry) retryQueue.push({ ...c, _retry: true });
  }

  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent   = wrong;

  apiPost('/card-result', {
    userId: TG_USER_ID, word: c.word, article: c.article,
    chosen, correct: ok, sessionId: currentSessionId
  });

  document.querySelectorAll('.btn-article').forEach(b => {
    const art = b.textContent.trim();
    b.disabled = true;
    if (art === c.article)     b.classList.add('correct');
    else if (art === chosen)   b.classList.add('wrong');
  });
  document.getElementById('card').classList.add('flipped');

  setTimeout(() => {
    idx++;
    if (idx >= deck.length) {
      if (retryQueue.length > 0 && !inRetryRound) {
        inRetryRound = true;
        deck = [...deck, ...shuffle(retryQueue)];
        retryQueue = [];
        document.getElementById('cardTotal').textContent = deck.length;
        loadCard();
      } else {
        showDone();
      }
    } else {
      loadCard();
    }
  }, 1400);
}

// ── Done screen ────────────────────────────────────────────────────────────
async function showDone() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';

  const total = deck.length;
  const pct   = Math.round(correct / total * 100);

  document.getElementById('doneEmoji').textContent = pct >= 80 ? '🏆' : pct >= 50 ? '💪' : '📚';
  document.getElementById('doneScore').textContent = correct + '/' + total;
  document.getElementById('doneSub').textContent   = pct + '% correct · keep it up!';
  document.getElementById('doneScreen').style.display = '';
  document.getElementById('statsGrid').style.display  = 'none';

  updateStreak();
  renderStreak('streakBadgeGame');

  apiPost('/session', {
    userId: TG_USER_ID, sessionId: currentSessionId,
    correct, wrong, total,
    durationMs: Date.now() - sessionStart
  });

  if (TG_USER_ID !== 'anonymous') {
    const stats = await apiGet(`/stats/${TG_USER_ID}`);
    if (stats) {
      document.getElementById('statSessions').textContent = stats.totalSessions || 0;
      document.getElementById('statAccuracy').textContent = (stats.accuracy  || 0) + '%';
      document.getElementById('statWeak').textContent     = (stats.weakWords || []).length;
      document.getElementById('statsGrid').style.display  = 'grid';
    }
  }

  try {
    if (window.Telegram?.WebApp?.sendData) {
      Telegram.WebApp.sendData(JSON.stringify({ type:'german_flashcards', correct, wrong, total, pct }));
    }
  } catch(_) {}
}

// ── Navigation ─────────────────────────────────────────────────────────────
function goMenu() {
  document.getElementById('doneScreen').style.display  = 'none';
  document.getElementById('gameScreen').style.display  = 'none';
  document.getElementById('startScreen').style.display = '';
  renderStreak('streakBadgeStart');
}

function restartSame() {
  document.getElementById('doneScreen').style.display = 'none';
  if (lastRestartOptions) initGame(lastRestartOptions.cards);
  else startGame();
}

// ── Swipe ──────────────────────────────────────────────────────────────────
let tStartX = 0, tStartY = 0, swipeConsumed = false;

document.getElementById('cardScene').addEventListener('touchstart', e => {
  tStartX = e.touches[0].clientX;
  tStartY = e.touches[0].clientY;
  swipeConsumed = false;
}, { passive: true });

document.getElementById('cardScene').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tStartX;
  const dy = e.changedTouches[0].clientY - tStartY;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  if (answered) return;
  if (ax > 50 && ax > ay * 1.4) {
    swipeConsumed = true;
    answer(dx < 0 ? 'der' : 'die');
  } else if (dy < -50 && ay > ax * 1.4) {
    swipeConsumed = true;
    answer('das');
  }
}, { passive: true });

document.getElementById('cardScene').addEventListener('click', () => {
  if (swipeConsumed) { swipeConsumed = false; return; }
  flipCard();
});

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('gameScreen').style.display === 'none') return;
  if      (e.key === '1')                     answer('der');
  else if (e.key === '2')                     answer('die');
  else if (e.key === '3')                     answer('das');
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

// ── Telegram init ──────────────────────────────────────────────────────────
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── Boot ───────────────────────────────────────────────────────────────────
setupStart();
</script>
